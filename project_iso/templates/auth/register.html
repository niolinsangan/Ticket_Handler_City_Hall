{% extends "base.html" %}

{% block title %}Register - City ENRO Travel Request{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0"><i class="bi bi-person-plus"></i> Employee Registration</h4>
            </div>
            <div class="card-body">
<div class="alert alert-info">
                        <h5><i class="bi bi-info-circle"></i> Account Creation</h5>
                        <p class="mb-0">Contact your admin officer to create your account. Self-registration is disabled.</p>
                        <a href="{{ url_for('auth.login') }}" class="btn btn-primary mt-2">
                            <i class="bi bi-box-arrow-in-right"></i> Go to Login
                        </a>
                    </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
